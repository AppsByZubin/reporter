name: Build and publish reporter image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_REPOSITORY: bizzkpm/reporter
  INFRA_REPOSITORY: AppsByZubin/infrastructure
  INFRA_VALUES_FILE: helm/reporter/values.yaml

jobs:
  build-push-update-helm:
    runs-on: ubuntu-latest

    steps:
      - name: Check out reporter
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: docker.io/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Check out infrastructure
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPOSITORY }}
          token: ${{ secrets.INFRASTRUCTURE_REPO_TOKEN }}
          path: infrastructure

      - name: Update reporter Helm image tag
        working-directory: infrastructure
        run: |
          sed -i -E "s/^  tag: .*/  tag: \"${IMAGE_TAG}\"/" "${INFRA_VALUES_FILE}"
          git diff -- "${INFRA_VALUES_FILE}"

      - name: Commit Helm image tag
        working-directory: infrastructure
        run: |
          if git diff --quiet -- "${INFRA_VALUES_FILE}"; then
            echo "Reporter Helm image tag is already ${IMAGE_TAG}; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${INFRA_VALUES_FILE}"
          git commit -m "Update reporter image tag to ${IMAGE_TAG}"
          git push
